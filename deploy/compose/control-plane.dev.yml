services:
  control-plane:
    build:
      context: ../..
      dockerfile: deploy/docker/control-plane/Dockerfile
    environment:
      - DATABASE_URL=file:/data/claudedock.db
      - CONTROL_PLANE_ADDR=:8080
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "8080:8080"
    volumes:
      - claudedock-data:/data

  managed-user:
    build:
      context: ../..
      dockerfile: deploy/docker/managed-user/Dockerfile
    privileged: true
    volumes:
      - claudedock-data:/data
    restart: unless-stopped

volumes:
  claudedock-data:
